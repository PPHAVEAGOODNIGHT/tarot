<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PPTarot</title>
    <style>
        :root {
            --bg-dark: #050409;
            --card-purple: rgba(22, 17, 43, 0.95);
            --gold-light: #ffd166;
            --gold-glow: #ffb703;
            --text-main: #e2e0eb;
        }

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background:rgba(10,8,18,0.3); border-radius:4px; }
        ::-webkit-scrollbar-thumb { background:rgba(157,78,223,0.4); border-radius:4px; }
        ::-webkit-scrollbar-thumb:hover { background:rgba(157,78,223,0.6); }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(ellipse at 50% 35%, rgba(76, 201, 240, 0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(123, 44, 191, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 70%, rgba(255, 184, 3, 0.04) 0%, transparent 50%);
            background-size: 100% 100%;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* 浮动粒子 */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--gold-light);
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) scale(0); opacity: 0; }
            10%  { opacity: 0.6; }
            30%  { opacity: 0.2; }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }

        /* 主要内容层 */
        .app-shell {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 560px;
            min-height: 100vh;
            padding: 28px 16px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 8px;
            width: 100%;
        }
        h1 {
            color: var(--gold-light);
            font-size: 2rem;
            letter-spacing: 6px;
            margin: 0 0 6px 0;
            text-shadow: 0 0 20px var(--gold-glow);
            font-weight: 900;
        }
        h1::before, h1::after { content: " ✦ "; color: var(--gold-glow); font-size: 1.2rem; }
        .subtitle {
            color: #8e8aab;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .preload-status {
            font-size: 0.65rem;
            color: #6c648b;
            margin-bottom: 18px;
            transition: opacity 0.5s ease;
            height: 18px;
        }
        .preload-status.done { opacity: 0; pointer-events: none; }

        /* 按钮区 */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            width: 100%;
        }
        .controls-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button {
            flex: 1;
            color: #fff;
            border: none;
            padding: 14px 8px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            white-space: nowrap;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        button::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            opacity: 0;
            transition: opacity 0.2s;
            background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent);
        }
        button:hover::after { opacity: 1; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
        button:disabled::after { display: none; }

        .btn-primary {
            background: linear-gradient(135deg, #6b21a8, #4a0e78);
            box-shadow: 0 4px 18px rgba(107, 33, 168, 0.45);
        }
        .btn-random {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            box-shadow: 0 4px 18px rgba(168, 85, 247, 0.4);
        }
        .btn-spread {
            background: linear-gradient(135deg, #0d9488, #0f766e);
            box-shadow: 0 4px 18px rgba(13, 148, 136, 0.4);
        }
        .btn-extra {
            background: linear-gradient(135deg, #334155, #1e293b);
            box-shadow: 0 4px 14px rgba(51, 65, 85, 0.3);
            width: 100%;
            max-width: 260px;
            transition: opacity 0.35s ease, transform 0.35s ease, margin 0.35s ease;
            margin-top: 4px;
            flex: none;
        }
        .btn-extra.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
            margin-top: 0;
            height: 0;
            padding: 0;
            overflow: hidden;
        }

        /* 主内容区 */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 340px;
            position: relative;
        }

        /* 占位装饰区 */
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 1;
            transform: scale(1);
        }
        .placeholder.hidden {
            opacity: 0;
            transform: scale(0.92);
            pointer-events: none;
            position: absolute;
        }

        /* CSS 塔罗牌背 */
        .card-back-wrapper {
            position: relative;
            width: 180px;
            height: 250px;
            animation: cardFloat 4s ease-in-out infinite;
        }
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50%      { transform: translateY(-10px) rotate(1deg); }
        }
        .card-back {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            background:
                linear-gradient(135deg, #1e1040 0%, #0d0725 50%, #150a30 100%);
            border: 2.5px solid rgba(255, 209, 102, 0.5);
            box-shadow:
                0 0 30px rgba(255, 184, 3, 0.25),
                0 10px 40px rgba(0, 0, 0, 0.5),
                inset 0 0 60px rgba(123, 44, 191, 0.1);
            position: relative;
            overflow: hidden;
        }
        /* 牌背星芒图案 */
        .card-back::before {
            content: '';
            position: absolute;
            inset: 12px;
            border: 1px solid rgba(255, 209, 102, 0.2);
            border-radius: 10px;
        }
        .card-back::after {
            content: '✦';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 209, 102, 0.5);
            text-shadow: 0 0 20px rgba(255, 184, 3, 0.4);
            animation: starPulse 2s ease-in-out infinite;
        }
        /* 牌背装饰线 */
        .card-back-rings {
            position: absolute;
            inset: 24px;
            border: 1px solid rgba(255, 209, 102, 0.12);
            border-radius: 8px;
        }
        .card-back-rings::after {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(255, 209, 102, 0.08);
            border-radius: 6px;
        }
        @keyframes starPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
            50%      { transform: translate(-50%, -50%) scale(1.15); opacity: 0.7; }
        }

        .hero-text {
            text-align: center;
            color: #8e8aab;
            font-size: 0.78rem;
            letter-spacing: 2px;
            line-height: 1.6;
            animation: textFade 3s ease-in-out infinite;
        }
        @keyframes textFade {
            0%, 100% { opacity: 0.5; }
            50%      { opacity: 1; }
        }

        .card-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1050px;
        }

        .spread-label {
            text-align: center;
            margin-bottom: 16px;
            font-size: 0.8rem;
            color: var(--gold-light);
            letter-spacing: 3px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .spread-label.visible { opacity: 1; }

        /* 单张牌卡片 */
        .tarot-card-box {
            width: 100%;
            max-width: 260px;
            margin-bottom: 16px;
        }
        .card-inner {
            background: var(--card-purple);
            border: 1px solid rgba(157, 78, 223, 0.3);
            border-radius: 18px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.55);
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .tarot-card-box.show .card-inner {
            opacity: 1;
            transform: translateY(0);
        }

        .position-title {
            font-size: 0.75rem;
            color: #b79ced;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card-art-container {
            width: 100%;
            height: 340px;
            border-radius: 10px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            background: #090714;
            border: 2px solid var(--gold-light);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tarot-card-box.reversed .card-art-container { transform: rotate(180deg); }

        .card-art-img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 10px;
            position: absolute; top: 0; left: 0;
            z-index: 2;
            transition: opacity 0.4s ease;
        }
        .card-art-img.loaded { opacity: 1; }
        .card-art-img.loading, .card-art-img.error { opacity: 0; }

        .card-loader {
            position: absolute; z-index: 1;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            color: #8e8aab; font-size: 0.7rem;
        }
        .card-loader-spinner {
            width: 26px; height: 26px;
            border: 2px solid rgba(157, 78, 223, 0.3);
            border-top-color: var(--gold-light);
            border-radius: 50%;
            animation: spinLoader 0.8s linear infinite;
        }
        @keyframes spinLoader { to { transform: rotate(360deg); } }

        .card-fallback {
            position: absolute; z-index: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            opacity: 1; transition: opacity 0.3s ease;
        }
        .card-fallback.hidden { opacity: 0; }

        .art-wands { background: radial-gradient(circle at bottom, #f72585 10%, #7209b7 60%, #090714 100%); }
        .art-wands .fallback-icon { font-size: 3rem; animation: flameBurn 1.5s ease-in-out infinite alternate; filter: drop-shadow(0 0 15px #f72585); }
        .art-cups { background: radial-gradient(circle at center, #4cc9f0 0%, #3a0ca3 70%, #090714 100%); }
        .art-cups .fallback-icon { font-size: 3rem; animation: waterRipple 2s ease-in-out infinite alternate; filter: drop-shadow(0 0 15px #4cc9f0); }
        .art-swords { background: linear-gradient(45deg, #222538 0%, #4a5568 50%, #090714 100%); }
        .art-swords .fallback-icon { font-size: 3rem; animation: swordGlint 1s linear infinite alternate; filter: drop-shadow(0 0 15px #cbd5e1); }
        .art-pentacles { background: radial-gradient(circle at center, #ffd166 10%, #1e3a1e 70%, #090714 100%); }
        .art-pentacles .fallback-icon { font-size: 3rem; animation: goldSpin 3s linear infinite; filter: drop-shadow(0 0 20px var(--gold-glow)); }
        .art-major-fool { background: radial-gradient(circle, #fff 10%, #4361ee 70%, #000 100%); }
        .art-major-magician { background: linear-gradient(135deg, #ff0055, #00ffcc); }
        .art-major-priestess { background: radial-gradient(circle at top left, #fff, #111 80%); }
        .art-major-death { background: linear-gradient(to bottom, #000 50%, #fff 100%); }
        .art-major-sun { background: radial-gradient(circle, #ffb703 30%, #f72585 80%); }
        .art-major-default { background: radial-gradient(circle, #7209b7 20%, #1a1530 80%); }

        .fallback-icon { font-size: 3.2rem; z-index: 5; user-select: none; }

        @keyframes flameBurn { 0% { transform: scale(0.9) translateY(5px); } 100% { transform: scale(1.1) translateY(-5px); } }
        @keyframes waterRipple { 0% { transform: scale(0.85); opacity: 0.7; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes swordGlint { 0% { filter: drop-shadow(0 0 5px #fff); } 100% { filter: drop-shadow(0 0 20px #4cc9f0); } }
        @keyframes goldSpin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .card-name {
            font-size: 1.05rem; font-weight: bold;
            color: var(--gold-light); margin: 6px 0 3px 0;
        }
        .card-orientation {
            display: inline-block; padding: 2px 12px; border-radius: 16px;
            font-size: 0.7rem; font-weight: bold; margin-bottom: 10px;
        }
        .orient-up { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .orient-down { background: rgba(231,76,60,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }

        .card-meaning {
            font-size: 0.8rem; line-height: 1.55; color: #cbd5e1; text-align: left;
            border-top: 1px dashed rgba(157,78,223,0.2); padding-top: 10px;
        }
        .card-meaning strong { color: var(--gold-light); }

        /* 底部 */
        .deck-info {
            font-size: 0.65rem; color: #5c5480; text-align: center;
            margin-top: 8px; min-height: 18px;
        }

        .footer-bar {
            text-align: center;
            padding: 14px 0 6px;
            font-size: 0.6rem;
            color: #3d3560;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        /* ═══════════════════════════
           牌阵弹窗
           ═══════════════════════════ */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(2, 1, 8, 0.85);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 16px;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }

        .modal-panel {
            background: var(--card-purple);
            border: 1px solid rgba(157, 78, 223, 0.35);
            border-radius: 22px;
            width: 100%; max-width: 500px; max-height: 82vh;
            overflow-y: auto;
            padding: 24px 18px 20px;
            transform: translateY(30px);
            transition: transform 0.3s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .modal-overlay.open .modal-panel { transform: translateY(0); }

        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .modal-title { color: var(--gold-light); font-size: 1.1rem; font-weight: bold; letter-spacing: 2px; }
        .modal-close {
            width: 30px; height: 30px; border-radius: 50%;
            border: 1px solid rgba(157,78,223,0.35);
            background: rgba(22,17,43,0.8);
            color: #8e8aab; font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex: none; padding: 0;
        }
        .modal-close:hover { color: #fff; border-color: #7b2cbf; }

        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .spread-card {
            background: rgba(30,23,53,0.8);
            border: 1px solid rgba(157,78,223,0.15);
            border-radius: 14px; padding: 16px 12px;
            cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .spread-card:hover {
            border-color: rgba(157,78,223,0.5);
            background: rgba(40,30,65,0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123,44,191,0.2);
        }
        .spread-card:active { transform: scale(0.97); }
        .spread-icon { font-size: 1.4rem; margin-bottom: 6px; }
        .spread-name { color: var(--gold-light); font-size: 0.82rem; font-weight: bold; margin-bottom: 3px; }
        .spread-count {
            display: inline-block; font-size: 0.6rem; padding: 1px 8px; border-radius: 10px;
            background: rgba(157,78,223,0.18); color: #b79ced; margin-bottom: 6px;
        }
        .spread-desc { font-size: 0.65rem; color: #8e8aab; line-height: 1.35; }
    </style>
</head>
<body>

    <!-- 浮动粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 应用外壳 -->
    <div class="app-shell">

        <header>
            <a href="index.html" onclick="history.back();return false" class="back-btn" style="position:fixed; top:14px; left:14px; z-index:50; font-size:0.72rem; color:#ffd166; text-decoration:none; display:inline-flex; align-items:center; gap:4px; padding:6px 14px; border:1px solid rgba(255,209,102,0.3); border-radius:6px; background:rgba(10,8,18,0.92); backdrop-filter:blur(8px); transition:all 0.2s;">← 返回</a>
            <h1>PPTarot</h1>
            <div class="subtitle">闭上双眼，静心冥想你的问题</div>
        </header>

        <div class="preload-status" id="preloadStatus">牌灵预载中…</div>

        <div class="controls">
            <div class="controls-row">
                <button class="btn-primary" onclick="drawTarot({count:1})">单牌启示</button>
                <button class="btn-random" onclick="drawRandom()">随机抽牌</button>
                <button class="btn-spread" onclick="openSpreadPanel()">牌阵</button>
            </div>
        </div>

        <!-- 主舞台 -->
        <div class="main-stage" id="mainStage">
            <!-- 占位装饰 -->
            <div class="placeholder" id="placeholder">
                <div class="card-back-wrapper">
                    <div class="card-back">
                        <div class="card-back-rings"></div>
                    </div>
                </div>
                <div class="hero-text">轻触上方按钮<br>抽取你的命运之牌</div>
            </div>

            <div class="spread-label" id="spreadLabel"></div>
            <div class="card-display" id="cardDisplay"></div>
        </div>

        <button class="btn-extra hidden" id="btnExtra" onclick="drawExtra()">补抽一张</button>
        <div class="deck-info" id="deckInfo"></div>

        <div class="footer-bar">78张韦特塔罗 · 探索命运的无限可能</div>
    </div>

    <!-- 牌阵弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeSpreadPanel(event)">
        <div class="modal-panel" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span class="modal-title">选择牌阵</span>
                <button class="modal-close" onclick="closeSpreadPanel()">&times;</button>
            </div>
            <div class="modal-grid" id="modalGrid"></div>
        </div>
    </div>

<script>
// ══════════════════════════════════════════════
// 浮动粒子生成
// ══════════════════════════════════════════════
(function initParticles() {
    const container = document.getElementById('particles');
    const colors = ['#ffd166', '#b79ced', '#4cc9f0', '#f72585', '#ffb703'];
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 1.5;
        p.style.cssText = `
            width:${size}px; height:${size}px;
            left:${Math.random()*100}%;
            bottom:-20px;
            background:${colors[Math.floor(Math.random()*colors.length)]};
            animation-duration:${Math.random()*12+8}s;
            animation-delay:${Math.random()*10}s;
            box-shadow: 0 0 ${size*3}px ${p.style.background};
        `;
        container.appendChild(p);
    }
})();

// ══════════════════════════════════════════════
// 图片源配置
// ══════════════════════════════════════════════
const IMG_BASE = 'https://raw.githubusercontent.com/satouyama/tarot-json/master/cards/';

// ══════════════════════════════════════════════
// 78张经典牌意数据库
// ══════════════════════════════════════════════
const TAROT_DECK = {
    "0 愚人 (The Fool)":             { artClass: "art-major-fool",     icon: "🕊️", imageUrl: IMG_BASE + "m00.jpg",
        "正位": "新开始、自由、无所畏惧、开启一段未知的全新冒险旅程。",
        "逆位": "鲁莽、不负责任、逃避现实、盲目冒险导致碰壁。" },
    "1 魔术师 (The Magician)":       { artClass: "art-major-magician", icon: "⚡", imageUrl: IMG_BASE + "m01.jpg",
        "正位": "万事俱备、拥有高超的行动力与显化能力、事情开始成形。",
        "逆位": "怀才不遇、计划流产、能力被滥用或存在欺骗行为。" },
    "2 女祭司 (The High Priestess)": { artClass: "art-major-priestess", icon: "🌙", imageUrl: IMG_BASE + "m02.jpg",
        "正位": "高度的直觉、潜意识的智慧、内心平静、等待最佳时机。",
        "逆位": "焦虑、忽视内心声音、流于表面、秘密被揭穿。" },
    "3 皇后 (The Empress)":          { artClass: "art-major-default",  icon: "👑", imageUrl: IMG_BASE + "m03.jpg",
        "正位": "富足、收获、母爱、充沛的创造力与物质享受。",
        "逆位": "缺乏安全感、控制欲过强、创造力受阻、过度沉溺。" },
    "4 皇帝 (The Emperor)":          { artClass: "art-major-default",  icon: "🏛️", imageUrl: IMG_BASE + "m04.jpg",

// ══════════════════════════════════════════════
// 小阿卡纳生成 (56张)
// ══════════════════════════════════════════════
const suits = {

            artClass: suitObj.css,

        };
    });
}

// ══════════════════════════════════════════════
// 牌阵库
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
// 全局状态
// ══════════════════════════════════════════════
const ALL_KEYS = Object.keys(TAROT_DECK);
let drawnCardKeys = new Set();
let totalCardsDrawn = 0;

const displayArea  = document.getElementById('cardDisplay');
const btnExtra     = document.getElementById('btnExtra');
const deckInfo     = document.getElementById('deckInfo');
const preloadStatus= document.getElementById('preloadStatus');
const modalOverlay = document.getElementById('modalOverlay');
const modalGrid    = document.getElementById('modalGrid');
const spreadLabel  = document.getElementById('spreadLabel');
const placeholder  = document.getElementById('placeholder');

// ══════════════════════════════════════════════
// 图片预加载
// ══════════════════════════════════════════════
function preloadAllImages() {
    const urls = ALL_KEYS.map(k => TAROT_DECK[k].imageUrl);
    let loaded = 0;
    const total = urls.length;
    function loadBatch(s) {
        const batch = urls.slice(s, s + 5);
        if (!batch.length) {
            preloadStatus.textContent = '牌灵就绪，请抽取你的命运之牌';
            preloadStatus.classList.add('done');
            return;
        }
        let done = 0;
        batch.forEach(url => {
            const img = new Image();
            img.onload = img.onerror = () => {
                loaded++; done++;
                preloadStatus.textContent = `牌灵预载中… ${loaded}/${total}`;
                if (done === batch.length) loadBatch(s + 5);
            };
            img.src = url;
        });
    }
    loadBatch(0);
}

// ══════════════════════════════════════════════
// 占位区显隐
// ══════════════════════════════════════════════
function hidePlaceholder() { placeholder.classList.add('hidden'); }
function showPlaceholder() { placeholder.classList.remove('hidden'); }

// ══════════════════════════════════════════════
// 牌阵面板
// ══════════════════════════════════════════════
function buildSpreadPanel() {
    modalGrid.innerHTML = SPREADS.map(s => `
        <div class="spread-card" onclick="selectSpread('${s.id}')">
            <div class="spread-icon">${s.icon}</div>
            <div class="spread-name">${s.name}</div>
            <div class="spread-count">${s.count} 张牌</div>
            <div class="spread-desc">${s.desc}</div>
        </div>
    `).join('');
}

function openSpreadPanel() {
    if (!modalGrid.children.length) buildSpreadPanel();
    modalOverlay.classList.add('open');
}

function closeSpreadPanel(e) {
    if (e && e.target !== modalOverlay) return;
    modalOverlay.classList.remove('open');
}

function selectSpread(id) {
    const spread = SPREADS.find(s => s.id === id);
    if (!spread) return;
    modalOverlay.classList.remove('open');
    drawTarot({ count: spread.count, positions: spread.positions, spreadName: spread.name });
}

// ══════════════════════════════════════════════
// 更新补抽按钮
// ══════════════════════════════════════════════
function updateExtraButton() {
    const remaining = ALL_KEYS.length - drawnCardKeys.size;
    if (drawnCardKeys.size > 0 && remaining > 0) {
        btnExtra.classList.remove('hidden');
        btnExtra.disabled = false;
        btnExtra.textContent = `补抽一张（剩余 ${remaining} 张）`;
        deckInfo.textContent = `已揭示 ${drawnCardKeys.size} 张 · 牌库剩余 ${remaining} 张`;
    } else if (remaining === 0 && drawnCardKeys.size > 0) {
        btnExtra.classList.remove('hidden');
        btnExtra.disabled = true;
        btnExtra.textContent = '牌库已尽';
        deckInfo.textContent = '全部 78 张牌已揭示完毕';
    } else {
        btnExtra.classList.add('hidden');
        deckInfo.textContent = '';
    }
}

function showSpreadLabel(name) {
    spreadLabel.textContent = '✦ ' + name + ' ✦';
    spreadLabel.classList.add('visible');
}

// ══════════════════════════════════════════════
// 从剩余牌中随机抽取
// ══════════════════════════════════════════════
function pickRandomCards(count) {
    const remaining = ALL_KEYS.filter(k => !drawnCardKeys.has(k));
    if (!remaining.length) return [];
    const pool = [...remaining];
    const picked = [];
    const n = Math.min(count, pool.length);
    for (let i = 0; i < n; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        picked.push(pool[idx]);
        pool.splice(idx, 1);
    }
    picked.forEach(k => drawnCardKeys.add(k));
    return picked;
}

// ══════════════════════════════════════════════
// 渲染单张牌（带超时兜底）
// ══════════════════════════════════════════════
function renderCard(cardName, title, delay) {
    const isUpright = Math.random() > 0.5;
    const orientation = isUpright ? "正位" : "逆位";
    const cardData = TAROT_DECK[cardName];
    const meaning = cardData[orientation];

    const cardBox = document.createElement('div');
    cardBox.className = `tarot-card-box ${isUpright ? 'upright' : 'reversed'}`;
    const cardId = 'card_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
    cardBox.innerHTML = `
        <div class="card-inner">
            <div class="position-title">${title}</div>
            <div class="card-art-container ${cardData.artClass}">
                <img id="img_${cardId}" class="card-art-img loading" src="${cardData.imageUrl}" alt="${cardName}"
                     onload="handleImgLoad('${cardId}')"
                     onerror="handleImgError('${cardId}')">
                <div id="loader_${cardId}" class="card-loader"><div class="card-loader-spinner"></div><span>牌灵显现中…</span></div>
                <div id="fallback_${cardId}" class="card-fallback"><div class="fallback-icon">${cardData.icon}</div></div>
            </div>
            <div class="card-name">${cardName}</div>
            <div class="card-orientation ${isUpright ? 'orient-up' : 'orient-down'}">${orientation}</div>
            <div class="card-meaning"><strong>牌面启示：</strong>${meaning}</div>
        </div>`;
    displayArea.appendChild(cardBox);
    setTimeout(() => cardBox.classList.add('show'), delay);

    // 超时兜底：5秒后若图片仍未加载，强制显示降级图标
    setTimeout(() => {
        const img = document.getElementById('img_' + cardId);
        const loader = document.getElementById('loader_' + cardId);
        const fallback = document.getElementById('fallback_' + cardId);
        if (img && img.classList.contains('loading')) {
            img.classList.replace('loading', 'error');
            if (loader) loader.style.display = 'none';
            if (fallback) fallback.classList.remove('hidden');
        }
    }, 5000);
}

// 图片加载成功处理
function handleImgLoad(cardId) {
    const img = document.getElementById('img_' + cardId);
    const loader = document.getElementById('loader_' + cardId);
    const fallback = document.getElementById('fallback_' + cardId);
    if (img) img.classList.replace('loading', 'loaded');
    if (loader) loader.style.display = 'none';
    if (fallback) fallback.classList.add('hidden');
}

// 图片加载失败处理
function handleImgError(cardId) {
    const img = document.getElementById('img_' + cardId);
    const loader = document.getElementById('loader_' + cardId);
    const fallback = document.getElementById('fallback_' + cardId);
    if (img) img.classList.replace('loading', 'error');
    if (loader) loader.style.display = 'none';
    if (fallback) fallback.classList.remove('hidden');
}

// ══════════════════════════════════════════════
// 抽牌（通用）
// ══════════════════════════════════════════════
function drawTarot(config) {
    displayArea.innerHTML = '';
    drawnCardKeys = new Set();
    totalCardsDrawn = 0;
    hidePlaceholder();

    const chosenCards = pickRandomCards(config.count);
    if (!chosenCards.length) return;

    if (config.spreadName) {
        showSpreadLabel(config.spreadName);
    } else {
        spreadLabel.classList.remove('visible');
    }

    chosenCards.forEach((cardName, index) => {
        totalCardsDrawn++;
        let title;
        if (config.positions) {
            title = config.positions[index];
        } else if (config.count === 1) {
            title = "✦ 每日启示 ✦";
        } else {
            title = `启示 ${totalCardsDrawn}`;
        }
        renderCard(cardName, title, index * 200);
    });

    updateExtraButton();
}

// ══════════════════════════════════════════════
// 随机抽牌
// ══════════════════════════════════════════════
function drawRandom() {
    spreadLabel.classList.remove('visible');
    const count = Math.floor(Math.random() * 3) + 1;
    drawTarot({ count, positions: null });
}

// ══════════════════════════════════════════════
// 补抽
// ══════════════════════════════════════════════
function drawExtra() {
    const chosenCards = pickRandomCards(1);
    if (!chosenCards.length) return;
    totalCardsDrawn++;
    const existingCount = displayArea.querySelectorAll('.tarot-card-box').length;
    renderCard(chosenCards[0], `补抽 · 启示 ${totalCardsDrawn}`, existingCount * 100);
    updateExtraButton();
}

// ══════════════════════════════════════════════
// 启动
// ══════════════════════════════════════════════
preloadAllImages();
</script>
