<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PPTarot</title>
    <style>
        :root {
            --bg-dark: #050409;
            --card-purple: rgba(22, 17, 43, 0.95);
            --gold-light: #ffd166;
            --gold-glow: #ffb703;
            --text-main: #e2e0eb;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 50% 50%, rgba(76, 201, 240, 0.1) 0%, transparent 60%),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 20px);
            background-size: 100% 100%, 250px 250px;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        header { text-align: center; margin-bottom: 20px; }
        h1 {
            color: var(--gold-light);
            font-size: 1.8rem;
            letter-spacing: 4px;
            margin: 0 0 8px 0;
            text-shadow: 0 0 15px var(--gold-glow);
        }
        h1::before, h1::after { content: " ✦ "; color: var(--gold-glow); }
        .subtitle { color: #8e8aab; font-size: 0.85rem; }

        .preload-status {
            font-size: 0.7rem;
            color: #8e8aab;
            margin-bottom: 16px;
            transition: opacity 0.5s ease;
        }
        .preload-status.done { opacity: 0; pointer-events: none; }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 480px;
        }

        .controls-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #5a189a, #3c096c);
            color: #fff;
            border: 1px solid #7b2cbf;
            padding: 13px 8px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(123, 44, 191, 0.4);
            outline: none;
            white-space: nowrap;
        }
        button:active { transform: scale(0.96); }
        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-random {
            background: linear-gradient(135deg, #9b59b6, #6c3483);
            border-color: #af7ac5;
            box-shadow: 0 4px 20px rgba(155, 89, 182, 0.5);
        }

        .btn-spread {
            background: linear-gradient(135deg, #0d7377, #0a4d4f);
            border-color: #14a3a8;
            box-shadow: 0 4px 20px rgba(13, 115, 119, 0.5);
        }

        .btn-extra {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            border-color: #5d6d7e;
            box-shadow: 0 4px 18px rgba(93, 109, 126, 0.3);
            width: 100%;
            max-width: 280px;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .btn-extra.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px);
        }

        /* ════════════════════════════════════
           牌阵选择弹窗
           ════════════════════════════════════ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 1, 8, 0.82);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-panel {
            background: var(--card-purple);
            border: 1px solid rgba(157, 78, 223, 0.4);
            border-radius: 24px;
            width: 100%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px 22px 24px;
            transform: translateY(30px);
            transition: transform 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        }
        .modal-overlay.open .modal-panel { transform: translateY(0); }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }
        .modal-title {
            color: var(--gold-light);
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(157, 78, 223, 0.4);
            background: rgba(22, 17, 43, 0.8);
            color: #8e8aab;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex: none;
            padding: 0;
        }
        .modal-close:hover { color: #fff; border-color: #7b2cbf; }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .spread-card {
            background: rgba(30, 23, 53, 0.8);
            border: 1px solid rgba(157, 78, 223, 0.2);
            border-radius: 16px;
            padding: 18px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .spread-card:hover {
            border-color: rgba(157, 78, 223, 0.6);
            background: rgba(40, 30, 65, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(123, 44, 191, 0.25);
        }
        .spread-card:active { transform: scale(0.97); }

        .spread-icon {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        .spread-name {
            color: var(--gold-light);
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .spread-count {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 10px;
            border-radius: 12px;
            background: rgba(157, 78, 223, 0.2);
            color: #b79ced;
            margin-bottom: 8px;
        }
        .spread-desc {
            font-size: 0.7rem;
            color: #8e8aab;
            line-height: 1.4;
        }

        /* ════════════════════════════════════
           卡片展示
           ════════════════════════════════════ */
        .card-display {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1050px;
        }

        .tarot-card-box {
            width: 100%;
            max-width: 280px;
            margin-bottom: 20px;
        }

        .card-inner {
            background: var(--card-purple);
            border: 1px solid rgba(157, 78, 223, 0.35);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .tarot-card-box.show .card-inner {
            opacity: 1;
            transform: translateY(0);
        }

        .position-title {
            font-size: 0.8rem;
            color: #b79ced;
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .card-art-container {
            width: 100%;
            height: 380px;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            background: #090714;
            border: 2px solid var(--gold-light);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .tarot-card-box.reversed .card-art-container { transform: rotate(180deg); }

        .card-art-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
            transition: opacity 0.4s ease;
        }
        .card-art-img.loaded { opacity: 1; }
        .card-art-img.loading, .card-art-img.error { opacity: 0; }

        .card-loader {
            position: absolute; z-index: 1;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            color: #8e8aab; font-size: 0.75rem;
        }
        .card-loader-spinner {
            width: 30px; height: 30px;
            border: 2px solid rgba(157, 78, 223, 0.3);
            border-top-color: var(--gold-light);
            border-radius: 50%;
            animation: spinLoader 0.8s linear infinite;
        }
        @keyframes spinLoader { to { transform: rotate(360deg); } }

        .card-fallback {
            position: absolute; z-index: 0;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            opacity: 1; transition: opacity 0.3s ease;
        }
        .card-fallback.hidden { opacity: 0; }

        /* CSS 降级画布 */
        .art-wands { background: radial-gradient(circle at bottom, #f72585 10%, #7209b7 60%, #090714 100%); }
        .art-wands .fallback-icon { font-size: 3.5rem; animation: flameBurn 1.5s ease-in-out infinite alternate; filter: drop-shadow(0 0 15px #f72585); }
        .art-cups { background: radial-gradient(circle at center, #4cc9f0 0%, #3a0ca3 70%, #090714 100%); }
        .art-cups .fallback-icon { font-size: 3.5rem; animation: waterRipple 2s ease-in-out infinite alternate; filter: drop-shadow(0 0 15px #4cc9f0); }
        .art-swords { background: linear-gradient(45deg, #222538 0%, #4a5568 50%, #090714 100%); }
        .art-swords .fallback-icon { font-size: 3.5rem; animation: swordGlint 1s linear infinite alternate; filter: drop-shadow(0 0 15px #cbd5e1); }
        .art-pentacles { background: radial-gradient(circle at center, #ffd166 10%, #1e3a1e 70%, #090714 100%); }
        .art-pentacles .fallback-icon { font-size: 3.5rem; animation: goldSpin 3s linear infinite; filter: drop-shadow(0 0 20px var(--gold-glow)); }
        .art-major-fool { background: radial-gradient(circle, #fff 10%, #4361ee 70%, #000 100%); }
        .art-major-magician { background: linear-gradient(135deg, #ff0055, #00ffcc); }
        .art-major-priestess { background: radial-gradient(circle at top left, #fff, #111 80%); }
        .art-major-death { background: linear-gradient(to bottom, #000 50%, #fff 100%); }
        .art-major-sun { background: radial-gradient(circle, #ffb703 30%, #f72585 80%); }
        .art-major-default { background: radial-gradient(circle, #7209b7 20%, #1a1530 80%); }

        .fallback-icon { font-size: 3.8rem; z-index: 5; user-select: none; }

        @keyframes flameBurn { 0% { transform: scale(0.9) translateY(5px); } 100% { transform: scale(1.1) translateY(-5px); } }
        @keyframes waterRipple { 0% { transform: scale(0.85); opacity: 0.7; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes swordGlint { 0% { filter: drop-shadow(0 0 5px #fff); } 100% { filter: drop-shadow(0 0 20px #4cc9f0); } }
        @keyframes goldSpin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .card-name {
            font-size: 1.15rem; font-weight: bold;
            color: var(--gold-light); margin: 8px 0 4px 0;
        }
        .card-orientation {
            display: inline-block; padding: 3px 14px; border-radius: 20px;
            font-size: 0.75rem; font-weight: bold; margin-bottom: 12px;
        }
        .orient-up { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
        .orient-down { background: rgba(231,76,60,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }

        .card-meaning {
            font-size: 0.85rem; line-height: 1.6; color: #cbd5e1; text-align: left;
            border-top: 1px dashed rgba(157,78,223,0.25); padding-top: 12px;
        }
        .card-meaning strong { color: var(--gold-light); }

        .deck-info {
            margin-top: 15px; font-size: 0.7rem; color: #6c648b; text-align: center;
        }

        /* 牌阵标识条 */
        .spread-label {
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: var(--gold-light);
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .spread-label.visible { opacity: 1; }
    </style>
</head>
<body>

    <header>
        <h1>PPTarot</h1>
        <div class="subtitle">闭上双眼，静心冥想你的问题</div>
    </header>

    <div class="preload-status" id="preloadStatus">牌灵预载中…</div>

    <div class="controls">
        <div class="controls-row">
            <button onclick="drawTarot({count:1})">单牌启示</button>
            <button class="btn-random" onclick="drawRandom()">随机抽牌</button>
            <button class="btn-spread" onclick="openSpreadPanel()">牌阵</button>
        </div>
        <div class="controls-row">
            <button class="btn-extra hidden" id="btnExtra" onclick="drawExtra()">补抽一张</button>
        </div>
    </div>

    <div class="spread-label" id="spreadLabel"></div>
    <div class="card-display" id="cardDisplay"></div>
    <div class="deck-info" id="deckInfo"></div>

    <!-- 牌阵选择弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeSpreadPanel(event)">
        <div class="modal-panel" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span class="modal-title">选择牌阵</span>
                <button class="modal-close" onclick="closeSpreadPanel()">&times;</button>
            </div>
            <div class="modal-grid" id="modalGrid"></div>
        </div>
    </div>

<script>
// ══════════════════════════════════════════════
// 图片源配置
// ══════════════════════════════════════════════
const IMG_BASE = 'https://www.sacred-texts.com/tarot/pkt/img/';

// ══════════════════════════════════════════════
// 78张经典牌意数据库
// ══════════════════════════════════════════════
const TAROT_DECK = {
    "0 愚人 (The Fool)":             { artClass: "art-major-fool",     icon: "🕊️", imageUrl: IMG_BASE + "ar00.jpg",
        "正位": "新开始、自由、无所畏惧、开启一段未知的全新冒险旅程。",
        "逆位": "鲁莽、不负责任、逃避现实、盲目冒险导致碰壁。" },
    "1 魔术师 (The Magician)":       { artClass: "art-major-magician", icon: "⚡", imageUrl: IMG_BASE + "ar01.jpg",
        "正位": "万事俱备、拥有高超的行动力与显化能力、事情开始成形。",
        "逆位": "怀才不遇、计划流产、能力被滥用或存在欺骗行为。" },
    "2 女祭司 (The High Priestess)": { artClass: "art-major-priestess", icon: "🌙", imageUrl: IMG_BASE + "ar02.jpg",
        "正位": "高度的直觉、潜意识的智慧、内心平静、等待最佳时机。",
        "逆位": "焦虑、忽视内心声音、流于表面、秘密被揭穿。" },
    "3 皇后 (The Empress)":          { artClass: "art-major-default",  icon: "👑", imageUrl: IMG_BASE + "ar03.jpg",
        "正位": "富足、收获、母爱、充沛的创造力与物质享受。",
        "逆位": "缺乏安全感、控制欲过强、创造力受阻、过度沉溺。" },
    "4 皇帝 (The Emperor)":          { artClass: "art-major-default",  icon: "🏛️", imageUrl: IMG_BASE + "ar04.jpg",
        "正位": "秩序、稳定、强有力的控制、理性管理与保护者。",
        "逆位": "暴政、掌控欲过强、秩序混乱、缺乏核心领导力。" },
    "5 教皇 (The Hierophant)":       { artClass: "art-major-default",  icon: "📜", imageUrl: IMG_BASE + "ar05.jpg",
        "正位": "遵循传统、体制认可、遇到贵人指点或精神向导。",
        "逆位": "打破常规、叛逆、思想僵化、教条主义束缚。" },
    "6 恋人 (The Lovers)":           { artClass: "art-major-default",  icon: "💖", imageUrl: IMG_BASE + "ar06.jpg",
        "正位": "和谐、吸引力、做出遵循内心的重要抉择、价值观一致。",
        "逆位": "不和谐、情感冲突、逃避选择、团队错位。" },
    "7 战车 (The Chariot)":          { artClass: "art-major-default",  icon: "🛡️", imageUrl: IMG_BASE + "ar07.jpg",
        "正位": "依靠意志力克服障碍、获得阶段性胜利、掌握方向。",
        "逆位": "失控、方向错误、精力分散、面对挫折轻言放弃。" },
    "8 力量 (Strength)":             { artClass: "art-major-default",  icon: "🦁", imageUrl: IMG_BASE + "ar08.jpg",
        "正位": "以柔克刚的内在力量、极大的耐心与韧性、掌控局面。",
        "逆位": "自我怀疑、软弱无力、情绪失控或企图用暴力解决。" },
    "9 隐士 (The Hermit)":           { artClass: "art-major-default",  icon: "🕯️", imageUrl: IMG_BASE + "ar09.jpg",
        "正位": "内省、寻求真理、独立思考、暂时退隐以理清思绪。",
        "逆位": "孤立无援、偏执孤僻、拒绝外界建议、过于退缩。" },
    "10 命运之轮 (Wheel of Fortune)": { artClass: "art-major-default", icon: "🌀", imageUrl: IMG_BASE + "ar10.jpg",
        "正位": "运势转折点、命运的契机降临、顺应规律变化。",
        "逆位": "遇到外部阻力、坏习惯恶性循环、抗拒改变。" },
    "11 正义 (Justice)":             { artClass: "art-major-default",  icon: "⚖️", imageUrl: IMG_BASE + "ar11.jpg",
        "正位": "公平公正、真理大白、因果报应、理智抉择。",
        "逆位": "遭遇不公、逃避责任、偏见遮蔽了双眼。" },
    "12 倒吊人 (The Hanged Man)":    { artClass: "art-major-default",  icon: "⚓", imageUrl: IMG_BASE + "ar12.jpg",
        "正位": "换个角度看世界、甘愿牺牲、处于等待与开悟期。",
        "逆位": "无谓的牺牲、停滞不前、白费力气、抗拒付出。" },
    "13 死神 (Death)":               { artClass: "art-major-death",    icon: "💀", imageUrl: IMG_BASE + "ar13.jpg",
        "正位": "旧事物的彻底终结、不可逆的转变、迎来新生契机。",
        "逆位": "抗拒改变、沉溺过去、僵局难以打破、恐惧结束。" },
    "14 节制 (Temperance)":          { artClass: "art-major-default",  icon: "🏺", imageUrl: IMG_BASE + "ar14.jpg",
        "正位": "沟通顺畅、调和冲突、资源完美融合、净化疗愈。",
        "逆位": "失去平衡、难以调和、过度挥霍、沟通出现阻碍。" },
    "15 恶魔 (The Devil)":           { artClass: "art-major-default",  icon: "🔥", imageUrl: IMG_BASE + "ar15.jpg",
        "正位": "物质欲望严重、成瘾行为、被执念或阴暗面束缚。",
        "逆位": "思想觉醒、解脱束缚、直面恐惧、斩断不良关系。" },
    "16 高塔 (The Tower)":           { artClass: "art-major-default",  icon: "💥", imageUrl: IMG_BASE + "ar16.jpg",
        "正位": "突如其来的巨变、幻灭、破产、旧有结构的崩塌。",
        "逆位": "危机预警、阵痛期拉长、逃过一劫但仍需重组。" },
    "17 星星 (The Star)":            { artClass: "art-major-default",  icon: "⭐", imageUrl: IMG_BASE + "ar17.jpg",
        "正位": "希望指引、灵感涌现、心灵疗愈、对未来充满乐观。",
        "逆位": "失去希望、悲观失望、错失灵感、缺乏信念。" },
    "18 月亮 (The Moon)":            { artClass: "art-major-priestess", icon: "🐺", imageUrl: IMG_BASE + "ar18.jpg",
        "正位": "恐惧不安、幻象迷茫、潜意识波动、有隐藏的未知因数。",
        "逆位": "真相大白、误会消除、恐惧逐渐消退、回归现实。" },
    "19 太阳 (The Sun)":             { artClass: "art-major-sun",      icon: "☀️", imageUrl: IMG_BASE + "ar19.jpg",
        "正位": "巨大的成功、快乐无比、活力四射、充满自信与光明。",
        "逆位": "热情消退、短暂的受阻、虚荣心作祟、过度自信。" },
    "20 审判 (Judgement)":           { artClass: "art-major-default",  icon: "🔔", imageUrl: IMG_BASE + "ar20.jpg",
        "正位": "听到内心的召唤、重大决定迎来转机、原谅与重生。",
        "逆位": "自我怀疑、拒绝召唤、拖延决定、陷入过去的自责。" },
    "21 世界 (The World)":           { artClass: "art-major-default",  icon: "🌍", imageUrl: IMG_BASE + "ar21.jpg",
        "正位": "功德圆满、阶段性完美结局、达成目标、融会贯通。",
        "逆位": "未竟之业、差临门一脚、缺乏达成感、进展停滞。" }
};

// ══════════════════════════════════════════════
// 小阿卡纳生成 (56张)
// ══════════════════════════════════════════════
const suits = {
    "权杖 (Wands)":       { css: "art-wands",     icon: "🪄", prefix: "wa", desc: "行动、能量与激情" },
    "圣杯 (Cups)":        { css: "art-cups",      icon: "🏆", prefix: "cu", desc: "情感、人际与直觉" },
    "宝剑 (Swords)":     { css: "art-swords",    icon: "⚔️", prefix: "sw", desc: "思想、理智与冲突" },
    "星币 (Pentacles)":  { css: "art-pentacles", icon: "🪙", prefix: "pe", desc: "物质、金钱与现实" }
};

const rankToImgNum = {
    "Ace": "01", "2": "02", "3": "03", "4": "04", "5": "05",
    "6": "06", "7": "07", "8": "08", "9": "09", "10": "10",
    "侍从": "11", "骑士": "12", "王后": "13", "国王": "14"
};

const ranks = ["Ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "侍从", "骑士", "王后", "国王"];

for (let [suitName, suitObj] of Object.entries(suits)) {
    ranks.forEach((rank) => {
        let cardName = `${suitName} ${rank}`;
        let imgNum = rankToImgNum[rank];
        TAROT_DECK[cardName] = {
            artClass: suitObj.css,
            icon: suitObj.icon,
            imageUrl: IMG_BASE + suitObj.prefix + imgNum + ".jpg",
            "正位": `代表有关【${suitObj.desc}】的积极进展。在这个【${rank}】阶段，事情正顺应规律向前推进，适宜积极把握。`,
            "逆位": `代表有关【${suitObj.desc}】的迟滞或失衡。在【${rank}】阶段受到了外界阻碍、或意味着你正过度挥霍精力，需停下调整。`
        };
    });
}

// ══════════════════════════════════════════════
// 牌阵库
// ══════════════════════════════════════════════
const SPREADS = [
    {
        id: 'timeflow',
        icon: '⏳',
        name: '时间流三牌阵',

    },
    {

        count: 3,

    },
    {

        count: 4,
        positions: ['火 · 行动能量', '水 · 情感流动', '风 · 思维理智', '土 · 现实根基']
    },
    {
        id: 'lovers',

        name: '恋人十字',
        desc: '分析两性关系的自我、对方、现状与未来发展',

    },
    {

    },
    {

    },

    }

// ══════════════════════════════════════════════
// 全局状态
// ══════════════════════════════════════════════
const ALL_KEYS = Object.keys(TAROT_DECK);
let drawnCardKeys = new Set();
let totalCardsDrawn = 0;
let currentSpreadName = '';

const displayArea  = document.getElementById('cardDisplay');
const btnExtra     = document.getElementById('btnExtra');
const deckInfo     = document.getElementById('deckInfo');
const preloadStatus= document.getElementById('preloadStatus');
const modalOverlay = document.getElementById('modalOverlay');
const modalGrid    = document.getElementById('modalGrid');
const spreadLabel  = document.getElementById('spreadLabel');

// ══════════════════════════════════════════════
// 图片预加载
// ══════════════════════════════════════════════
function preloadAllImages() {
    const urls = ALL_KEYS.map(k => TAROT_DECK[k].imageUrl);
    let loaded = 0;
    const total = urls.length;
    function loadBatch(s) {
        const batch = urls.slice(s, s + 5);
        if (!batch.length) {
            preloadStatus.textContent = '牌灵就绪，请抽取你的命运之牌';
            preloadStatus.classList.add('done');
            return;
        }
        let done = 0;
        batch.forEach(url => {
            const img = new Image();
            img.onload = img.onerror = () => {
                loaded++; done++;
                preloadStatus.textContent = `牌灵预载中… ${loaded}/${total}`;
                if (done === batch.length) loadBatch(s + 5);
            };
            img.src = url;
        });
    }
    loadBatch(0);
}

// ══════════════════════════════════════════════
// 牌阵面板
// ══════════════════════════════════════════════
function buildSpreadPanel() {
    modalGrid.innerHTML = SPREADS.map(s => `
        <div class="spread-card" onclick="selectSpread('${s.id}')">
            <div class="spread-icon">${s.icon}</div>
            <div class="spread-name">${s.name}</div>
            <div class="spread-count">${s.count} 张牌</div>
            <div class="spread-desc">${s.desc}</div>
        </div>
    `).join('');
}

function openSpreadPanel() {
    if (!modalGrid.children.length) buildSpreadPanel();
    modalOverlay.classList.add('open');
}

function closeSpreadPanel(e) {
    if (e && e.target !== modalOverlay) return;
    modalOverlay.classList.remove('open');
}

function selectSpread(id) {
    const spread = SPREADS.find(s => s.id === id);
    if (!spread) return;
    modalOverlay.classList.remove('open');
    drawTarot({ count: spread.count, positions: spread.positions, spreadName: spread.name });
}

// ══════════════════════════════════════════════
// 更新补抽按钮 & 牌阵标签
// ══════════════════════════════════════════════
function updateExtraButton() {
    const remaining = ALL_KEYS.length - drawnCardKeys.size;
    if (drawnCardKeys.size > 0 && remaining > 0) {
        btnExtra.classList.remove('hidden');
        btnExtra.disabled = false;
        btnExtra.textContent = `补抽一张（剩余 ${remaining} 张）`;
        deckInfo.textContent = `已揭示 ${drawnCardKeys.size} 张 · 牌库剩余 ${remaining} 张`;
    } else if (remaining === 0 && drawnCardKeys.size > 0) {
        btnExtra.classList.remove('hidden');
        btnExtra.disabled = true;
        btnExtra.textContent = '牌库已尽';
        deckInfo.textContent = `全部 78 张牌已揭示完毕`;
    } else {
        btnExtra.classList.add('hidden');
        deckInfo.textContent = '';
    }
}

function showSpreadLabel(name) {
    spreadLabel.textContent = '✦ ' + name + ' ✦';
    spreadLabel.classList.add('visible');
}

// ══════════════════════════════════════════════
// 从剩余牌中随机抽取（不重复）
// ══════════════════════════════════════════════
function pickRandomCards(count) {
    const remaining = ALL_KEYS.filter(k => !drawnCardKeys.has(k));
    if (!remaining.length) return [];
    const pool = [...remaining];
    const picked = [];
    const n = Math.min(count, pool.length);
    for (let i = 0; i < n; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        picked.push(pool[idx]);
        pool.splice(idx, 1);
    }
    picked.forEach(k => drawnCardKeys.add(k));
    return picked;
}

// ══════════════════════════════════════════════
// 渲染单张牌
// ══════════════════════════════════════════════
function renderCard(cardName, title, delay) {
    const isUpright = Math.random() > 0.5;
    const orientation = isUpright ? "正位" : "逆位";
    const cardData = TAROT_DECK[cardName];
    const meaning = cardData[orientation];

    const cardBox = document.createElement('div');
    cardBox.className = `tarot-card-box ${isUpright ? 'upright' : 'reversed'}`;
    cardBox.innerHTML = `
        <div class="card-inner">
            <div class="position-title">${title}</div>
            <div class="card-art-container ${cardData.artClass}">
                <img class="card-art-img loading" src="${cardData.imageUrl}" alt="${cardName}"
                     onload="this.classList.replace('loading','loaded');this.nextElementSibling.style.display='none';this.nextElementSibling.nextElementSibling.classList.add('hidden');"
                     onerror="this.classList.replace('loading','error');this.nextElementSibling.style.display='none';">
                <div class="card-loader"><div class="card-loader-spinner"></div><span>牌灵显现中…</span></div>
                <div class="card-fallback"><div class="fallback-icon">${cardData.icon}</div></div>
            </div>
            <div class="card-name">${cardName}</div>
            <div class="card-orientation ${isUpright ? 'orient-up' : 'orient-down'}">${orientation}</div>
            <div class="card-meaning"><strong>牌面启示：</strong>${meaning}</div>
        </div>`;
    displayArea.appendChild(cardBox);
    setTimeout(() => cardBox.classList.add('show'), delay);
}

// ══════════════════════════════════════════════
// 抽牌（通用 - 支持配置对象）
// ══════════════════════════════════════════════
function drawTarot(config) {
    // config: { count, positions?, spreadName? }
    displayArea.innerHTML = '';
    drawnCardKeys = new Set();
    totalCardsDrawn = 0;

    const chosenCards = pickRandomCards(config.count);
    if (!chosenCards.length) return;

    // 牌阵标签
    if (config.spreadName) {
        showSpreadLabel(config.spreadName);
    } else {
        spreadLabel.classList.remove('visible');
    }

    chosenCards.forEach((cardName, index) => {
        totalCardsDrawn++;
        let title;
        if (config.positions) {
            title = config.positions[index];
        } else if (config.count === 1) {
            title = "✦ 每日启示 ✦";
        } else {
            title = `启示 ${totalCardsDrawn}`;
        }
        renderCard(cardName, title, index * 200);
    });

    updateExtraButton();
}

// ══════════════════════════════════════════════
// 随机抽牌
// ══════════════════════════════════════════════
function drawRandom() {
    spreadLabel.classList.remove('visible');
    const count = Math.floor(Math.random() * 3) + 1;
    drawTarot({ count, positions: null });
}

// ══════════════════════════════════════════════
// 补抽一张
// ══════════════════════════════════════════════
function drawExtra() {
    const chosenCards = pickRandomCards(1);
    if (!chosenCards.length) return;
    totalCardsDrawn++;
    const existingCount = displayArea.querySelectorAll('.tarot-card-box').length;
    renderCard(chosenCards[0], `补抽 · 启示 ${totalCardsDrawn}`, existingCount * 100);
    updateExtraButton();
}

// ══════════════════════════════════════════════
// 启动
// ══════════════════════════════════════════════
preloadAllImages();
</script>
