<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ PP塔罗 - 秘灵全图占卜系统</title>
    <style>
        :root {
            --bg-dark: #070510;
            --card-purple: #1a1530;
            --gold-light: #ffd166;
            --gold-glow: #ffb703;
            --purple-glow: rgba(157, 78, 223, 0.4);
            --text-main: #e2e0eb;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 {
            color: var(--gold-light);
            font-size: 1.8rem;
            letter-spacing: 3px;
            margin: 0 0 8px 0;
            text-shadow: 0 0 15px rgba(255, 183, 3, 0.6);
        }
        h1::before, h1::after { content: " ✦ "; color: var(--gold-glow); }
        .subtitle { color: #8e8aab; font-size: 0.85rem; letter-spacing: 1px; }

        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 450px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #5a189a, #3c096c);
            color: #fff;
            border: 1px solid #7b2cbf;
            padding: 14px 10px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px var(--purple-glow);
            outline: none;
        }

        button:active { transform: scale(0.96); }

        .card-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 950px;
        }

        .tarot-card-box {
            width: 100%;
            max-width: 260px;
            perspective: 1000px;
            margin-bottom: 15px;
        }

        .card-inner {
            background: linear-gradient(145deg, var(--card-purple), #110e22);
            border: 1px solid rgba(157, 78, 223, 0.3);
            border-radius: 16px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .tarot-card-box.show .card-inner {
            opacity: 1;
            transform: translateY(0);
        }

        .position-title {
            font-size: 0.8rem;
            color: #b79ced;
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* 🎨 代码动态生成的卡片主图区域 */
        .card-artwork {
            width: 100%;
            height: 270px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 2px solid var(--gold-light);
            background: #09061a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            transition: transform 0.5s ease;
        }

        .card-artwork.reversed {
            transform: rotate(180deg);
        }

        /* 内嵌 SVG 的样式控制 */
        .card-artwork svg {
            width: 100%;
            height: 100%;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--gold-light);
            margin: 5px 0;
        }

        .card-orientation {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin: 5px 0 12px 0;
        }
        .orient-up { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .orient-down { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }

        .card-meaning {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #cbd5e1;
            text-align: left;
            border-top: 1px dashed rgba(157, 78, 223, 0.2);
            padding-top: 10px;
        }
        .card-meaning strong { color: var(--gold-light); }
    </style>
</head>
<body>

    <header>
        <h1>星轨塔罗占卜</h1>
        <div class="subtitle">闭上双眼，静心冥想你的问题</div>
    </header>

    <div class="controls">
        <button onclick="drawTarot(1)">🌌 单牌启示</button>
        <button onclick="drawTarot(3)">⏳ 时间流三牌阵</button>
    </div>

    <div class="card-display" id="cardDisplay"></div>

<script>
// 色系配置表，用于为不同牌组渲染对应的神秘氛围调色
const PALETTES = {
    major: { bg: "#0d0a2d", light: "#9d4edf", accent: "#ffd166" }, // 大阿卡纳：神秘高贵的深紫金
    wands: { bg: "#2a120a", light: "#ff7b00", accent: "#ffb703" }, // 权杖：热情洋溢的火红橘
    cups:  { bg: "#051c2c", light: "#00b4d8", accent: "#90e0ef" }, // 圣杯：深邃流动的海洋蓝
    swords: { bg: "#1a1e24", light: "#e2e8f0", accent: "#748cab" }, // 宝剑：冰冷理智的风暴银
    pentacles: { bg: "#0b2516", light: "#2a9d8f", accent: "#e9c46a" } // 星币：稳重富足的土矿绿
};

// --- 完美的 78 张全套塔罗牌数据中心 ---
const TAROT_DECK = {
    "0 愚人 (The Fool)": { "type": "major", "symbol": "🌌", "icon": "🧭", "正位": "新开始、冒险、自由、自发性、无限可能。", "逆位": "鲁莽、不负责任、冒失、方向迷失、固执。" },
    "1 魔术师 (The Magician)": { "type": "major", "symbol": "⚡", "icon": "🔮", "正位": "创造力、行动力、显化、潜能、专注。", "逆位": "欺骗、能力未发挥、计划难产、操纵。" },
    "2 女祭司 (The High Priestess)": { "type": "major", "symbol": "🌙", "icon": "📜", "正位": "直觉、潜意识、神秘、内心平静、智慧。", "逆位": "肤浅、忽视直觉、秘密泄露、情绪波动。" },
    "3 皇后 (The Empress)": { "type": "major", "symbol": "👑", "icon": "🌿", "正位": "丰收、母爱、自然、富足、创造力与生命力。", "逆位": "缺乏安全感、过度控制、创造力受阻、匮乏。" },
    "4 皇帝 (The Emperor)": { "type": "major", "symbol": "🏛️", "icon": "🛡️", "正位": "权威、结构、稳定、控制、保护、理性。", "逆位": "暴政、掌控欲过强、缺乏纪律、无能为力。" },
    "5 教皇 (The Hierophant)": { "type": "major", "symbol": "📜", "icon": "🔔", "正位": "传统、体制、精神向导、学习、遵循规范。", "逆位": "叛逆、打破常规、思想僵化、教条主义。" },
    "6 恋人 (The Lovers)": { "type": "major", "symbol": "💖", "icon": "🏹", "正位": "爱、和谐、关系、重要的选择、价值观一致。", "逆位": "不和谐、错位、逃避选择、情感冲突。" },
    "7 战车 (The Chariot)": { "type": "major", "symbol": "🛡️", "icon": "🐎", "正位": "意志力、胜利、决心、克服障碍、掌控方向。", "逆位": "失控、缺乏动力、方向错误、侵略性过强。" },
    "8 力量 (Strength)": { "type": "major", "symbol": "🦁", "icon": "♾️", "正位": "勇气、内在力量、耐心、温柔的掌控、韧性。", "逆位": "软弱、自我怀疑、情绪失控、滥用暴力。" },
    "9 隐士 (The Hermit)": { "type": "major", "symbol": "🏮", "icon": "🏔️", "正位": "内省、寻求真理、孤独、沉思、内心向导。", "逆位": "孤立、偏执、拒绝建议、过于退缩。" },
    "10 命运之轮 (Wheel of Fortune)": { "type": "major", "symbol": "🎡", "icon": "🔄", "正位": "好运、转折点、命运、顺应变化、契机。", "逆位": "厄运、抵抗改变、外部阻力、坏习惯循环。" },
    "11 正义 (Justice)": { "type": "major", "symbol": "⚖️", "icon": "⚔️", "正位": "公平、真理、因果报应、法律事务、诚实。", "逆位": "不公、拒绝承担责任、偏见、不诚实。" },
    "12 倒吊人 (The Hanged Man)": { "type": "major", "symbol": "⏳", "icon": "⚓", "正位": "暂停、牺牲、换位思考、放下、等待。", "逆位": "无谓的牺牲、停滞不前、拖延、抗拒付出。" },
    "13 死神 (Death)": { "type": "major", "symbol": "💀", "icon": "🥀", "正位": "终结、转变、新生、放手、必然的改变。", "逆位": "抗拒改变、沉溺过去、僵局、恐惧结束。" },
    "14 节制 (Temperance)": { "type": "major", "symbol": "🧪", "icon": "🏺", "正位": "平衡、调和、耐心、疗愈、适度、融合。", "逆位": "失衡、缺乏净化、过度、冲突、难以调和。" },
    "15 恶魔 (The Devil)": { "type": "major", "symbol": "⛓️", "icon": "🔥", "正位": "束缚、物质欲望、成瘾、阴暗面、执念。", "逆位": "觉醒、解脱、摆脱束缚、直面恐惧。" },
    "16 高塔 (The Tower)": { "type": "major", "symbol": "💥", "icon": "⚡", "正位": "突变、剧变、幻灭、解构、突如其来的觉醒。", "逆位": "躲过一劫、恐惧改变、阵痛期延长、抗拒重组。" },
    "17 星星 (The Star)": { "type": "major", "symbol": "⭐", "icon": "✨", "正位": "希望、信仰、疗愈、乐观、灵感、宁静。", "逆位": "失望、悲观、缺乏信仰、错失灵感。" },
    "18 月亮 (The Moon)": { "type": "major", "symbol": "🔮", "icon": "🐺", "正位": "恐惧、焦虑、幻象、潜意识、迷茫、未知。", "逆位": "解除误会、真相大白、恐惧消退、直面现实。" },
    "19 太阳 (The Sun)": { "type": "major", "symbol": "☀️", "icon": "🌻", "正位": "成功、快乐、活力、自信、光明、显赫。", "逆位": "热情消退、短暂的挫折、过度自信、虚荣。" },
    "20 审判 (Judgement)": { "type": "major", "symbol": "🔔", "icon": "🎺", "正位": "召唤、觉醒、重大决定、原谅、重生。", "逆位": "自我怀疑、拒绝召唤、拖延决定、自责。" },
    "21 世界 (The World)": { "type": "major", "symbol": "🌍", "icon": "🕊️", "正位": "圆满、完成、成就、旅行、完美结局。", "逆业": "未竟之业、停滞、缺乏达成感、差临门一脚。" }
};

// 动态扩展注入 56 张小阿卡纳四组流派
const suits = { 
    "权杖 (Wands)": { type: "wands", symbol: "🪄", icon: "🔥" }, 
    "圣杯 (Cups)": { type: "cups", symbol: "🏆", icon: "💧" }, 
    "宝剑 (Swords)": { type: "swords", symbol: "⚔️", icon: "💨" }, 
    "星币 (Pentacles)": { type: "pentacles", symbol: "🪙", icon: "🌱" } 
};
const ranks = ["Ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "侍从", "骑士", "王后", "国王"];

for (let [suitName, suitObj] of Object.entries(suits)) {
    ranks.forEach((rank) => {
        let cardName = `${suitName} ${rank}`;
        TAROT_DECK[cardName] = {
            "type": suitObj.type,
            "symbol": suitObj.symbol,
            "icon": suitObj.icon,
            "正位": `代表该元素在【${rank}】阶段的正面显化，能量流动顺畅，时机成熟。`,
            "逆位": `代表该元素在【${rank}】阶段受到了阻碍、过度挥霍、或能量正处于内敛调整期。`
        };
    });
}

const positions = ["✨ 过去 (Past)", "🔮 现在 (Present)", "⏳ 未来 (Future)"];

// --- 🛠️ 核心：利用代码绘制高阶 SVG 卡片图谱 ---
function generateTarotSVG(cardData, cardName) {
    const palette = PALETTES[cardData.type];
    
    return `
    <svg viewBox="0 0 200 270" xmlns="http://www.w3.org/2000/svg">
        <!-- 背景底色 -->
        <rect width="100%" height="100%" fill="${palette.bg}"/>
        
        <!-- 神秘学艺术渐变光晕 -->
        <defs>
            <radialGradient id="glow-${cardData.type}" cx="50%" cy="45%" r="50%">
                <stop offset="0%" stop-color="${palette.light}" stop-opacity="0.4"/>
                <stop offset="100%" stop-color="${palette.bg}" stop-opacity="0"/>
            </radialGradient>
        </defs>
        <rect width="100%" height="100%" fill="url(#glow-${cardData.type})"/>

        <!-- 经典复古双线内边框 -->
        <rect x="8" y="8" width="184" height="254" fill="none" stroke="${palette.accent}" stroke-width="1.5" stroke-opacity="0.7" rx="6"/>
        <rect x="12" y="12" width="176" height="246" fill="none" stroke="${palette.accent}" stroke-width="0.5" stroke-opacity="0.4" rx="4"/>

        <!-- 顶部和底部的古典星宿装饰 -->
        <text x="20" y="26" fill="${palette.accent}" font-size="10" opacity="0.5">✦</text>
        <text x="180" y="26" fill="${palette.accent}" font-size="10" opacity="0.5" text-anchor="end">✦</text>
        <text x="20" y="252" fill="${palette.accent}" font-size="10" opacity="0.5">✦</text>
        <text x="180" y="252" fill="${palette.accent}" font-size="10" opacity="0.5" text-anchor="end">✦</text>

        <!-- 中央神圣几何圣殿拱门 -->
        <path d="M 40 210 L 40 100 A 60 60 0 0 1 160 100 L 160 210 Z" fill="none" stroke="${palette.accent}" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,3"/>

        <!-- 核心图腾徽章外圈 -->
        <circle cx="100" cy="125" r="45" fill="none" stroke="${palette.accent}" stroke-width="1" opacity="0.6"/>
        <circle cx="100" cy="125" r="49" fill="none" stroke="${palette.light}" stroke-width="0.5" stroke-dasharray="4,2" opacity="0.5"/>

        <!-- 卡片核心意象符号 (大尺寸) -->
        <text x="100" y="145" font-size="52" text-anchor="middle" filter="drop-shadow(0px 0px 8px ${palette.light})">${cardData.symbol}</text>
        
        <!-- 次级意象衬托符号 (小尺寸) -->
        <text x="100" y="80" font-size="18" text-anchor="middle" opacity="0.8">${cardData.icon}</text>

        <!-- 底部麦穗线或装点线 -->
        <path d="M 60 220 Q 100 230 140 220" fill="none" stroke="${palette.accent}" stroke-width="1.5" opacity="0.5"/>
    </svg>
    `;
}

// --- 抽牌逻辑 ---
function drawTarot(mode) {
    const displayArea = document.getElementById('cardDisplay');
    displayArea.innerHTML = ''; 

    const allKeys = Object.keys(TAROT_DECK);
    const chosenCards = [];

    while (chosenCards.length < mode) {
        const randIndex = Math.floor(Math.random() * allKeys.length);
        const card = allKeys[randIndex];
        if (!chosenCards.includes(card)) {
            chosenCards.push(card);
        }
    }

    chosenCards.forEach((cardName, index) => {
        const isUpright = Math.random() > 0.5;
        const orientation = isUpright ? "正位" : "逆位";
        const cardData = TAROT_DECK[cardName];
        const meaning = cardData[orientation];

        const cardBox = document.createElement('div');
        cardBox.className = 'tarot-card-box';
        
        // 生成纯代码高清矢量图
        const svgImage = generateTarotSVG(cardData, cardName);
        
        cardBox.innerHTML = `
            <div class="card-inner">
                <div class="position-title">${mode === 3 ? positions[index] : "✦ 每日启示 ✦"}</div>
                
                <!-- 🎨 纯代码内嵌的高清神秘学图形插画 -->
                <div class="card-artwork ${isUpright ? '' : 'reversed'}">
                    ${svgImage}
                </div>

                <div class="card-name">${cardName.replace(/\(.*?\)/, '')}</div>
                <div class="card-orientation ${isUpright ? 'orient-up' : 'orient-down'}">${orientation}</div>
                <div class="card-meaning"><strong>牌面启示：</strong>${meaning}</div>
            </div>
        `;

        displayArea.appendChild(cardBox);

        setTimeout(() => {
            cardBox.classList.add('show');
        }, index * 200);
    });
}
</script>

</body>
</html>
