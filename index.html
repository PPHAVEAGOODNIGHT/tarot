<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔮 PP塔罗-线上占卜系统</title>
    <style>
        :root {
            --bg-dark: #070510;
            --card-purple: #1a1530;
            --gold-light: #ffd166;
            --gold-glow: #ffb703;
            --purple-glow: rgba(157, 78, 223, 0.4);
            --text-main: #e2e0eb;
        }

        /* 全局样式与星空背景 */
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 {
            color: var(--gold-light);
            font-size: 1.8rem;
            letter-spacing: 3px;
            margin: 0 0 8px 0;
            text-shadow: 0 0 15px rgba(255, 183, 3, 0.6);
        }
        h1::before, h1::after { content: " ✦ "; color: var(--gold-glow); }
        .subtitle { color: #8e8aab; font-size: 0.85rem; letter-spacing: 1px; }

        .controls {
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 450px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #5a189a, #3c096c);
            color: #fff;
            border: 1px solid #7b2cbf;
            padding: 14px 10px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px var(--purple-glow);
            outline: none;
        }

        button:active { transform: scale(0.96); }

        .card-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 950px;
        }

        .tarot-card-box {
            width: 100%;
            max-width: 250px;
            perspective: 1000px;
            margin-bottom: 15px;
        }

        .card-inner {
            background: linear-gradient(145deg, var(--card-purple), #110e22);
            border: 1px solid rgba(157, 78, 223, 0.3);
            border-radius: 16px;
            padding: 18px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .tarot-card-box.show .card-inner {
            opacity: 1;
            transform: translateY(0);
        }

        .position-title {
            font-size: 0.8rem;
            color: #b79ced;
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* 🖼️ 正版韦特牌面容器 */
        .card-image-container {
            width: 100%;
            height: 340px; /* 严格符合韦特经典纸牌的修长比例 */
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid var(--gold-light);
            background: #09061a;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .tarot-img {
            width: 100%;
            height: 100%;
            object-fit: fill; /* 完美铺满容器，展现完整画像 */
            transition: transform 0.5s ease;
        }

        /* 当为逆位时，整张原版图片180度倒置，极其逼真 */
        .card-image-container.reversed .tarot-img {
            transform: rotate(180deg);
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--gold-light);
            margin: 5px 0;
        }

        .card-orientation {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin: 5px 0 12px 0;
        }
        .orient-up { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid rgba(46, 204, 113, 0.3); }
        .orient-down { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid rgba(231, 76, 60, 0.3); }

        .card-meaning {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #cbd5e1;
